<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Customer Dashboard | Enock Finance</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{

margin:0;

padding:0;

box-sizing:border-box;

font-family:'Poppins',sans-serif;

}

body{

background:#f4f7fb;

}

/* Sidebar */

.sidebar{

position:fixed;

left:0;

top:0;

width:250px;

height:100%;

background:#083d77;

padding-top:20px;

}

.sidebar h2{

color:#fff;

text-align:center;

margin-bottom:40px;

}

.sidebar h2 span{

color:#f4b400;

}

.sidebar a{

display:block;

padding:15px 25px;

color:white;

text-decoration:none;

transition:.3s;

}

.sidebar a:hover{

background:#0f5fa6;

padding-left:35px;

}

/* Main */

.main{

margin-left:250px;

padding:30px;

}

.header{

display:flex;

justify-content:space-between;

align-items:center;

margin-bottom:30px;

}

.header h1{

color:#083d77;

}

.profile{

font-weight:bold;

color:#083d77;

}

/* Cards */

.cards{

display:grid;

grid-template-columns:repeat(auto-fit,minmax(220px,1fr));

gap:20px;

margin-bottom:30px;

}

.card{

background:white;

padding:25px;

border-radius:15px;

box-shadow:0 5px 15px rgba(0,0,0,.1);

transition:.3s;

}

.card:hover{

transform:translateY(-5px);

}

.card h2{

color:#083d77;

margin-bottom:10px;

}

/* Loan Status */

.status{

background:white;

padding:30px;

border-radius:15px;

box-shadow:0 5px 15px rgba(0,0,0,.1);

}

.status table{

width:100%;

border-collapse:collapse;

margin-top:20px;

}

.status th,.status td{

padding:15px;

border-bottom:1px solid #ddd;

text-align:left;

}

.status th{

background:#083d77;

color:white;

}

.pending{

color:orange;

font-weight:bold;

}

/* Button */

.btn{

display:inline-block;

margin-top:20px;

padding:12px 25px;

background:#f4b400;

color:#083d77;

text-decoration:none;

border-radius:8px;

font-weight:bold;

transition:.3s;

}

.btn:hover{

background:#083d77;

color:white;

}

@media(max-width:768px){

.sidebar{

width:100%;

height:auto;

position:relative;

}

.main{

margin-left:0;

}

}

</style>

</head>

<body>

<div class="sidebar">

<h2>ENOCK <span>FINANCE</span></h2>

<a href="dashboard.html">🏠 Dashboard</a>





<a href="my profile.html">👤 My Profile</a>

<a href="settings.html">⚙ Settings</a>
<a href="loans.html">💵Loans</a>
<a href="index.html">🚪 Logout</a>

</div>

<div class="main">

<div class="header">

<h1>Welcome Back!</h1>

<div class="profile">

Customer

</div>

</div>

<div class="cards">

<div class="card">

<h2>Total Loans</h2>

<h1>0</h1>

</div>

<div class="card">

<h2>Loan Amount</h2>

<h1>GH₵ 0.00</h1>

</div>

<div class="card">

<h2>Status</h2>

<h1 class="pending">Pending</h1>

</div>

<div class="card">

<h2>Savings</h2>

<h1>GH₵ 0.00</h1>

</div>

</div>

<div class="status">

<h2>Recent Loan Application</h2>

<table>

<tr>

<th>Application ID</th>

<th>Amount</th>

<th>Date</th>

<th>Status</th>

</tr>

<tr>

<td>#1001</td>

<td>GH₵0.00</td>

<td>26 June 2026</td>

<td class="pending">Pending</td>

</tr>

</table>



</div>

</div>

</body>

</html>
